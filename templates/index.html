<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<style>
body{
margin:0;
min-height:100vh;
background:linear-gradient(to bottom,#1e3c72,#2a5298);
display:flex;
flex-direction:column;
align-items:center;
color:white;
font-family:Arial;
padding:20px;
}
form{
background:rgba(255,255,255,0.1);
padding:25px;
border-radius:12px;
width:100%;
max-width:400px;
display:flex;
flex-direction:column;
align-items:center;
}
input,select,textarea,button{
width:90%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:none;
}
button{
background:#2a5298;
color:white;
cursor:pointer;
}
a{color:gold;}
</style>
</head>

<body>

<h2>Register</h2>

{% with messages = get_flashed_messages() %}
{% if messages %}
<div style="color:yellow;">
{% for message in messages %}
<p>{{ message }}</p>
{% endfor %}
</div>
{% endif %}
{% endwith %}

<form method="POST">

<input name="name" placeholder="Full Name" required>
<input type="email" name="email" placeholder="Email" required>

<input type="tel"
       name="phone"
       placeholder="Phone"
       maxlength="11"
       inputmode="numeric"
       required
       oninput="this.value = this.value.replace(/[^0-9]/g, '')">

<select name="church">
{% for church in churches %}
<option value="{{ church }}">{{ church }}</option>
{% endfor %}
</select>

    <div style="
width:90%;
background:rgba(255,255,255,0.08);
padding:15px;
border-radius:10px;
margin-top:10px;
">

<label style="font-size:14px; font-weight:bold; display:block; margin-bottom:8px;">
Întrebări cu privire la tema întâlnirii „Influențe”?
</label>

<textarea name="question"
          rows="4"
          placeholder="Scrie întrebarea ta aici..."
          style="
          width:100%;
          padding:10px;
          border-radius:8px;
          border:none;
          resize:none;
          font-family:Arial;
          ">
</textarea>

<label style="
display:flex;
align-items:center;
margin-top:10px;
font-size:14px;
cursor:pointer;
">
<input type="checkbox" name="anonymous" style="margin-right:8px;">
Send Anonymous
</label>

</div>

<button type="submit">Register</button>

</form>
<p>Already registered?
   <a href="{{ url_for('login') }}">Log in here</a>
</p>
</body>
</html>
