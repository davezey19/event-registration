<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>
body{
margin:0;
background:linear-gradient(to bottom,#1e3c72,#2a5298);
color:white;
font-family:Arial;
padding:20px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
background:rgba(255,255,255,0.1);
}

th,td{
padding:10px;
border:1px solid rgba(255,255,255,0.3);
}

th{
background:#2a5298;
}

.delete-btn{
background:#e74c3c;
border:none;
color:white;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
}

.checkin-btn{
background:#2ecc71;
border:none;
color:white;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
}

a{
color:gold;
text-decoration:none;
}
</style>
</head>

<body>

<div class="header">
<h1>Admin Dashboard</h1>
<a href="{{ url_for('admin_logout') }}">Logout</a>
</div>

<table>
<tr>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Church</th>
<th>Team</th>
<th>Status</th>
<th>Actions</th>
</tr>

{% for p in participants %}
<tr>

<td>{{ p.name }}</td>
<td>{{ p.email }}</td>
<td>{{ p.phone }}</td>
<td>{{ p.church }}</td>

<td style="background-color: {{ teams[p.team] }}; color:white;">
{{ p.team }}
</td>

<td>
{% if p.checked_in %}
Checked In
{% else %}
Not Arrived
{% endif %}
</td>

<td>

<form method="POST" action="{{ url_for('admin_checkin', participant_id=p.id) }}" style="display:inline;">
<button type="submit" class="checkin-btn">Check In</button>
</form>

<form method="POST" action="{{ url_for('admin_remove', participant_id=p.id) }}" style="display:inline;">
<button type="submit" class="delete-btn">Remove</button>
</form>

</td>

</tr>
{% endfor %}

</table>

</body>
</html>
