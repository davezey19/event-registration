<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome</title>

<style>
body{
margin:0;
height:100vh;
background:linear-gradient(to bottom,#1e3c72,#2a5298);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
font-family:Arial;
text-align:center;
}
#logo{
width:320px;
max-width:70%;
margin-bottom:20px;
}
#footer{
position:absolute;
bottom:10px;
right:10px;
font-size:0.8rem;
opacity:0.7;
}

body {
    transition: opacity 1s ease;
}

.fade-out {
    opacity: 0;
}

.loader-container {
    width: 250px;
    height: 6px;
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    margin-top: 20px;
    overflow: hidden;
}

.loader-bar {
    height: 100%;
    width: 0%;
    background: white;
    animation: loading 5s linear forwards;
}

@keyframes loading {
    from { width: 0%; }
    to { width: 100%; }
}
</style>

<script>
setTimeout(function(){
    document.body.classList.add("fade-out");

    setTimeout(function(){
        window.location.href = "/register";
    }, 1500); // wait for fade animation to finish

}, 5000); // splash visible for 4 seconds
</script>

</head>

<body>

<img src="{{ url_for('static', filename='logo.png') }}" id="logo">
<h1>Conferinta tineret BCB Maranata “Influente” - 14 Martie 2026</h1>
<div class="loader-container">
    <div class="loader-bar"></div>
</div>
<div id="footer">
Programmed by David Andronic and Elias Chis
</div>

</body>
</html>
